<!DOCTYPE html>
<head>
  <title>bella7898</title>
  <style>
    .wrapper {
      overflow: hidden;
     }
    .sliding-background {
      height: 960px;
      width: 6000px;
     }
    .sliding-background {
      background: url("files/bg-image.svg") repeat-x;
      height: 500px;
      width: 5076px;
      animation: slide 60s linear infinite;
     }
    @keyframes slide {
      0%{
        transform: translate3d(0, 0, 0);
      }
      100%{
        transform: translate3d(-1692px, 0, 0);
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="sliding-background"></div>
  </div>
</body>
